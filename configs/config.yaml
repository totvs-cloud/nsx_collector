influxdb:
  url: "http://10.114.35.75:8086"
  org: "TOTVS"
  bucket: "nsx"
  capacity_bucket: "nsx_capacity"

logging:
  level: "info"
  format: "json"

telemetry:
  enabled: true
  address: ":9101"

intervals:
  default: 40s
  traffic: 15s
  slow: 5m    # alarms, capacity, LB — dados que mudam lentamente

# Overrides de velocidade para interfaces onde a API NSX retorna link_speed = 0
# (comum em interfaces DPDK/fastpath fp-* em Edge nodes bare-metal).
# Formato: node_name -> interface_id -> velocidade em Mbps.
interface_speed_overrides:
  "tesp3edg1p00011.tesp3infra.local":
    fp-eth0: 10000   # 10G — ajuste conforme necessário
    fp-eth1: 10000
    fp-eth2: 10000
    fp-eth3: 10000
    fp-eth4: 10000
    fp-eth5: 10000
