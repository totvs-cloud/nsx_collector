influxdb:
  url: "http://10.114.35.75:8086"
  org: "TOTVS"
  bucket: "nsx"
  capacity_bucket: "nsx_capacity"

logging:
  level: "info"
  format: "json"

telemetry:
  enabled: true
  address: ":9101"

intervals:
  default: 40s
  traffic: 15s
  slow: 5m    # alarms, capacity, LB — dados que mudam lentamente

# Overrides de velocidade para interfaces onde a API NSX retorna link_speed = 0
# (comum em interfaces DPDK/fastpath fp-* em Edge nodes bare-metal).
# Formato: node_name -> interface_id -> velocidade em Mbps.
interface_speed_overrides:
  # Confirmado via SSH "get physical-port" em 2026-04-16
  # Edges 1-2: Intel XXV710 — 25G
  "tesp3edg1p00001.tesp3infra.local":
    fp-eth0: 25000
    fp-eth2: 25000
  "tesp3edg1p00002.tesp3infra.local":
    fp-eth0: 25000
    fp-eth2: 25000
  # Edges 4-8: Intel X710 — 10G
  "tesp3edg1p00004.tesp3infra.local":
    fp-eth0: 10000
    fp-eth2: 10000
  "tesp3edg1p00005.tesp3infra.local":
    fp-eth0: 10000
    fp-eth1: 10000
  "tesp3edg1p00006.tesp3infra.local":
    fp-eth0: 10000
    fp-eth1: 10000
  "tesp3edg1p00007.tesp3infra.local":
    fp-eth0: 10000
    fp-eth2: 10000
  "tesp3edg1p00008.tesp3infra.local":
    fp-eth0: 10000
    fp-eth2: 10000
  # Edges 9-11: Mellanox — 10G (fp-eth2/4 ativas)
